name: chess

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

concurrency:
  group: chess
  cancel-in-progress: false

jobs:
  move:
    if: startsWith(github.event.issue.title, 'chess|')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r chess/requirements.txt

      - name: Play move
        id: play
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: python chess/play.py

      - name: Commit board
        if: steps.play.outputs.valid == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md chess/
          git commit -m "chess: ${{ steps.play.outputs.summary }}"
          for i in 1 2 3; do git push && break || git pull --rebase origin main; done

      - name: Reply and close
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file chess/comment.md
          gh issue close "${{ github.event.issue.number }}" --repo "${{ github.repository }}"
