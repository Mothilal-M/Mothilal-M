name: snake

on:
  schedule:
    - cron: "0 2 * * *" # daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Mothilal-M
          outputs: |
            dist/github-snake.svg?color_snake=#0F0E0C&color_dots=#EBEDF0,#DCE5B2,#C8D777,#AFC43A,#8CA62F
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#D6FF3F&color_dots=#171511,#2E3A16,#56691C,#8CA623,#D6FF3F

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
